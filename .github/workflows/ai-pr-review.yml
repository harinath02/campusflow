name: AI PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ai-pr-review:
    name: AI PR reviewer
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run AI PR reviewer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node .github/scripts/ai-pr-review.mjs