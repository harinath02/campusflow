name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: campusflow
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d campusflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      SPRING_PROFILES_ACTIVE: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: campusflow
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: test-secret-key-for-ci-only-change-in-production
      MAVEN_OPTS: "-Xmx1024m"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Register backend error matcher
        run: echo "::add-matcher::${GITHUB_WORKSPACE}/.github/problem-matchers/java-maven.json"

      - name: Verify backend entry point
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/check-entrypoints.sh" backend

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Validate Maven project
        run: |
          set -o pipefail
          mkdir -p "${GITHUB_WORKSPACE}/ci-logs"
          ./mvnw -B validate 2>&1 | tee "${GITHUB_WORKSPACE}/ci-logs/backend-validate.log"

      - name: Run backend tests
        run: |
          set -o pipefail
          mkdir -p "${GITHUB_WORKSPACE}/ci-logs"
          ./mvnw -B test 2>&1 | tee "${GITHUB_WORKSPACE}/ci-logs/backend-tests.log"

      - name: Build backend package
        run: |
          set -o pipefail
          mkdir -p "${GITHUB_WORKSPACE}/ci-logs"
          ./mvnw -B package -DskipTests 2>&1 | tee "${GITHUB_WORKSPACE}/ci-logs/backend-package.log"

      - name: Run backend verify
        run: |
          set -o pipefail
          mkdir -p "${GITHUB_WORKSPACE}/ci-logs"
          ./mvnw -B verify 2>&1 | tee "${GITHUB_WORKSPACE}/ci-logs/backend-verify.log"

      - name: Upload backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports
          if-no-files-found: ignore
          retention-days: 7

      - name: Show backend failure details
        if: failure() && hashFiles('ci-logs/backend-*.log') != ''
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/summarize-ci-failure.sh" backend "${GITHUB_WORKSPACE}/ci-logs/backend-*.log"

      - name: Upload backend failure logs
        if: failure() && hashFiles('ci-logs/backend-*.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: backend-failure-logs
          path: ci-logs/backend-*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload backend artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          if-no-files-found: error
          retention-days: 7

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: frontend

    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Register frontend error matcher
        run: echo "::add-matcher::${GITHUB_WORKSPACE}/.github/problem-matchers/angular-typescript.json"

      - name: Verify frontend entry point
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/check-entrypoints.sh" frontend

      - name: Install dependencies
        run: |
          set -o pipefail
          mkdir -p "${GITHUB_WORKSPACE}/ci-logs"
          npm ci 2>&1 | tee "${GITHUB_WORKSPACE}/ci-logs/frontend-install.log"

      - name: Run frontend lint
        run: |
          set -o pipefail
          mkdir -p "${GITHUB_WORKSPACE}/ci-logs"
          npm run lint --if-present 2>&1 | tee "${GITHUB_WORKSPACE}/ci-logs/frontend-lint.log"

      - name: Run frontend tests
        run: |
          set -o pipefail
          mkdir -p "${GITHUB_WORKSPACE}/ci-logs"

          TEST_SCRIPT="$(npm pkg get scripts.test)"

          if echo "$TEST_SCRIPT" | grep -qi "vitest"; then
            echo "Detected Vitest. Running tests with --run."
            npm test -- --run 2>&1 | tee "${GITHUB_WORKSPACE}/ci-logs/frontend-tests.log"
          else
            echo "Detected non-Vitest test runner. Running tests without browser override."
            npm test -- --watch=false --progress=false 2>&1 | tee "${GITHUB_WORKSPACE}/ci-logs/frontend-tests.log"
          fi

      - name: Build frontend production bundle
        run: |
          set -o pipefail
          mkdir -p "${GITHUB_WORKSPACE}/ci-logs"
          npm run build -- --configuration production --progress=false 2>&1 | tee "${GITHUB_WORKSPACE}/ci-logs/frontend-build.log"

      - name: Upload frontend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-reports
          path: |
            frontend/coverage
            frontend/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Show frontend failure details
        if: failure() && hashFiles('ci-logs/frontend-*.log') != ''
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/summarize-ci-failure.sh" frontend "${GITHUB_WORKSPACE}/ci-logs/frontend-*.log"

      - name: Upload frontend failure logs
        if: failure() && hashFiles('ci-logs/frontend-*.log') != ''
        uses: actions/upload-artifact@v4
        with:
          name: frontend-failure-logs
          path: ci-logs/frontend-*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload frontend artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  repository-health:
    name: Repository health checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required project structure
        run: |
          test -d backend || (echo "backend folder is missing" && exit 1)
          test -d frontend || (echo "frontend folder is missing" && exit 1)
          test -f README.md || (echo "README.md is missing" && exit 1)
          test -f .gitignore || (echo ".gitignore is missing" && exit 1)
          test -f .github/workflows/ci.yml || (echo "ci.yml is missing" && exit 1)

      - name: Check for accidental committed build outputs
        run: |
          if git ls-files | grep -E '(^|/)(target|dist|node_modules|\.class)(/|$)' ; then
            echo "Build outputs or dependency folders are committed. Remove them from Git."
            exit 1
          fi

      - name: Check workflow summary
        run: |
          echo "## Repository Health" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Required project structure is present." >> "$GITHUB_STEP_SUMMARY"
          echo "No obvious build output folders are committed." >> "$GITHUB_STEP_SUMMARY"

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - repository-health
    if: always()

    steps:
      - name: Generate CI summary
        run: |
          echo "## CampusFlow CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend checks | ${{ needs.backend.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend checks | ${{ needs.frontend.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository health checks | ${{ needs.repository-health.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any required job failed
        if: >
          needs.backend.result != 'success' ||
          needs.frontend.result != 'success' ||
          needs.repository-health.result != 'success'
        run: exit 1